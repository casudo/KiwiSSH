### HP Procurve Vendor Configuration
## Instructions for backing up HP Procurve devices

vendor:
  id: "hp_procurve"
  name: "HP Procurve"
  description: "HP Procurve devices"

### Session-level behavior
session:
  comment_prefix: "! "
  pagination:
    enabled: true
    patterns:
      - pattern: '^Press any key to continue(\\e\\[\\??\\d+(;\\d+)*[A-Za-z])*$'
        response: " "

### Commands to execute for backup
## Supported step types in command phases:
## - command: sends command text
## - command + then: sends command text, then sends interactive input
commands:
  ### Pre-backup commands (prepare the session) (OPTIONAL)
  ## Command outputs aren't saved in stored configuration
  pre_backup: 
    - command: "no page"
    # - command: "enable"
      # then:
      #   - "<enable user>"
      #   - "<enable password>"

  ### Main backup command(s)
  ## Commands whose output becomes the stored configuration
  backup:
    - command: "show version"
      metadata: true
    - command: "show module" # not supported on all models
      metadata: true
    - command: "show interfaces transceiver" # not supported on all models
      metadata: true
    # - command: "show tech transceivers" # older models
    #   metadata: true
    # - command: "show interfaces brief"
    #   metadata: true
    - command: "show flash"
      metadata: true
    - command: "show system-information" # not supported on all models
      metadata: true
    # - command: "show system information" # not supported on all models
    #   metadata: true
    - command: "show running-config"
      show_command_in_config: true

  ### Post-backup commands (cleanup) (OPTIONAL)
  ## Command outputs aren't saved in stored configuration
  post_backup: 
    - command: "logout"
      then:
        - "y"
        - "n"

### Configuration processing rules
## Processing reduces diff noise and trims non-config boilerplate
processing:
  ### Lines to strip from captured config (regex patterns)
  strip_patterns:
    # - "^(Current configuration).*$"
    # - "^(Configuration last updated at).*$"
    # - "^(Configuration last saved at).*$"
    # - "^(Configuration last synchronized at).*$"

  ### Lines that mark config boundaries
  ## If either boundary is missing, keep from/to the file edge.
  # config_start: "^# unifi$"
  # config_end: "^# misc$"

  ### Secret masking. When enabled=false, no redaction is applied.
  redaction:
    enabled: false
    patterns:
      - search: '^(snmp-server community) \S+(.*)$'
        replacement: '\1<secret redacted>\2'
      - search: '^(snmp-server host \S+) \S+(.*)$'
        replacement: '\1 <secret redacted>\2'
      - search: '^(radius-server host \S+ key) \S+(.*)$'
        replacement: '\1 <secret redacted>\2'
      - search: '^(radius-server key).*$'
        replacement: '\1 <secret redacted>'
      - search: '^(tacacs-server host \S+ key) \S+(.*)$'
        replacement: '\1 <secret redacted>\2'
      - search: '^(tacacs-server key).*$'
        replacement: '\1 <secret redacted>'
