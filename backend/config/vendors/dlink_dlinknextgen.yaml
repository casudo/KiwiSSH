### D-Link Vendor Configuration
## Instructions for backing up D-Link devices

vendor:
  id: "dlink_dlinknextgen"
  name: "D-Link Next Generation"
  description: "D-Link NG CLI Switches"
# Adds support for DXS-1210-12SC

### Session-level output behavior.
session:
  comment_prefix: "# "
  prompt: '[\w.@()\/-]+[#>]\s?$'

### Commands to execute for backup
## Supported step types in command phases:
## - command: sends command text
## - command + then: sends command text, then sends interactive input
commands:
  ### Pre-backup commands (prepare the session) (OPTIONAL)
  ## Command outputs aren't saved in stored configuration
  pre_backup:
    - command: "terminal length 0"
    - command: "terminal width 0"

  ### Main backup command(s)
  ## Commands whose output becomes the stored configuration
  backup:
    - command: "show switch"
      metadata: true
    - command: "show version"
      metadata: true
    - command: "show vlan"
      metadata: true
    - command: "show running-config"
      show_command_in_config: true
      
  ### Post-backup commands (cleanup) (OPTIONAL)
  ## Command outputs aren't saved in stored configuration
  post_backup:
    - command: "logout"

### Configuration processing rules
## Processing reduces diff noise and trims non-config boilerplate
processing:
  strip_patterns:
    - '^(!System Up Time).*'
    - '^(!Current SNTP Synchronized Time:).*'
  # config_start: "^config "
  # config_end: "^end$"
  ### Secret masking. When enabled=false, no redaction is applied.
  redaction:
    enabled: false
    patterns:
      - search: '(password) (\S+).*'
        replacement: '\1<secret-hidden>'
      - search: '(snmp-server group) (\S+) (v.*)'
        replacement: '\1<secret-hidden> \3'
      - search: '(snmp-server community) (\S+) (v.*)'
        replacement: '\1<secret-hidden> \3'
      - search: '^(snmp-server community ["\w]+) \S+'
        replacement: '\1<secret-hidden>'
      - search: '^(username [\w.@-]+ privilege \d{1,2} password \d{1,2}) \S+'
        replacement: '\1<secret-hidden>'
      - search: '^(\s+ppp (chap|pap) password \d) .+'
        replacement: '\1<secret-hidden>'
