### Cisco ASA Vendor Configuration
## Instructions for backing up Cisco ASA devices

vendor:
  id: "cisco_asa"
  name: "Cisco Adaptive Security Appliance"
  description: "Firewall"

### Session-level behavior
session:
  comment_prefix: "! "
  prompt: '^\r*([\w.@()-\/]+[#>]\s?)$'

### Commands to execute for backup
## Supported step types in command phases:
## - command: sends command text
## - command + then: sends command text, then sends interactive input
commands:
  ### Pre-backup commands (prepare the session) (OPTIONAL)
  ## Command outputs aren't saved in stored configuration
  pre_backup:
    - command: "enable"
      then: ["{{ enable_password }}"]
    - command: "terminal pager 0"
  

  ### Main backup command(s)
  ## Commands whose output becomes the stored configuration
  backup:
    - command: "show version"
      metadata: true
    - command: "show inventory" 
      metadata: true
    - command: "changeto system"
      metadata: true
    - command: "show running-config"
      show_command_in_config: true

  ### Post-backup commands (cleanup) (OPTIONAL)
  ## Command outputs aren't saved in stored configuration
  post_backup:
    - command: "exit"

### Configuration processing rules
## Processing reduces diff noise and trims non-config boilerplate
processing:
  ### Lines to strip from captured config (regex patterns)
  strip_patterns:
    - '\s+up\s+\d+\s+)|(.*days.*)'
    - '^Configuration has not been modified since last system restart.*'
    - '^Configuration last modified by.*'
    - '^Start-up time.*'

  ### Lines that mark config boundaries
  ## If either boundary is missing, keep from/to the file edge.
  # config_start: "^# unifi$"
  # config_end: "^# misc$"

  ### Secret masking. When enabled=false, no redaction is applied.
  redaction:
    enabled: false
    patterns:
      - search: '^(enable password) \S+ (.*)'
        replacement: '\1 <secret hidden> \2'
      - search: '^(passwd) \S+ (.*)'
        replacement: '\1 <secret hidden> \2'
      - search: '^(username \S+ password) \S+ (.*)'
        replacement: '\1 <secret hidden> \2'
      - search: '^(ikev[12] (?:(?:remote|local)-authentication )?pre-shared-key(?: hex)?) \S+'
        replacement: '\1 <secret hidden>'
      - search: '(?mi)^(aaa-server \S+(?: \(\S+\))? host \S+\n(?: [^\n]+\n)* +key) \S+$'
        replacement: '\1 <secret hidden>'
      - search: '^(ldap-login-password) \S+'
        replacement: '\1 <secret hidden>'
      - search: '^(snmp-server host .* community) \S+'
        replacement: '\1 <secret hidden>'
      - search: '^(failover key) .+'
        replacement: '\1 <secret hidden>'
      - search: '^(\s+ospf message-digest-key \d+ md5) .+'
        replacement: '\1 <secret hidden>'
      - search: '^(\s+ospf authentication-key) .+'
        replacement: '\1 <secret hidden>'
      - search: '^(\s+neighbor \S+ password) .+'
        replacement: '\1 <secret hidden>'
