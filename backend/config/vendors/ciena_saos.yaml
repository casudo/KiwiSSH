### Ciena SAOS Vendor Configuration
## Instructions for backing up Ciena SAOS devices

vendor:
  id: "ciena_saos"
  name: "Ciena SAOS"
  description: "Ciena SAOS devices (used for 6.x)"

### Session-level output behavior.
session:
  comment_prefix: "! "
  prompt: '^[\w-]+\*?>\s?'

### Commands to execute for backup
## Supported step types in command phases:
## - command: sends command text
## - command + then: sends command text, then sends interactive input
commands:
  ### Pre-backup commands (prepare the session) (OPTIONAL)
  ## Command outputs aren't saved in stored configuration
  pre_backup:
    - command: "system shell set more off"
    - command: "system shell session set more off"

  ### Main backup command(s)
  ## Commands whose output becomes the stored configuration
  backup:
    - command: "chassis show device-id power"
      metadata: true
    - command: "software show"
      metadata: true
    - command: "port xcvr show"
      metadata: true
    - command: "configuration show"
      show_command_in_config: true

  ### Post-backup commands (cleanup) (OPTIONAL)
  ## Command outputs aren't saved in stored configuration
  post_backup:
    - command: "exit"
      
### Configuration processing rules
## Processing reduces diff noise and trims non-config boilerplate
processing:
  strip_patterns:
    - '(Waiting for )(accounting|authorization).*\n'
    - 'Bank status'
    - '^SHELL PARSER FAILURE.*'
    - '(\s\|.{10}\|)(Ena\s\s|\s\sDis|UCTF\s)(.*)'
    - '^! Created: [^\n]*\n'
    - '^! On terminal: [^\n]*\n'
  # config_start: "^config "
  # config_end: "^end$"
  ### Secret masking. When enabled=false, no redaction is applied.
  redaction:
    enabled: false
    # patterns:
    #   - search: '^(set expert-password-hash ).*'
    #     replacement: '\1<EXPERT PASSWORD REMOVED>'
