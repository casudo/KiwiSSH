### ECI Telecom ECIapollo Vendor Configuration
## Instructions for backing up ECI Telecom ECIapollo devices

vendor:
  id: "ecitelecom_eciapollo"
  name: "ECI Telecom ECIapollo"
  description: "ECI Telecom ECIapollo"

### Session-level output behavior.
session:
  comment_prefix: "# "
  prompt: '^([\w.@()-]+[#>]\s?)$'

### Commands to execute for backup
## Supported step types in command phases:
## - command: sends command text
## - command + then: sends command text, then sends interactive input
commands:
  ### Pre-backup commands (prepare the session) (OPTIONAL)
  ## Command outputs aren't saved in stored configuration
  pre_backup:
    - command: "set cli screen-length 0"
    - command: "set cli screen-width 0"

  ### Main backup command(s)
  ## Commands whose output becomes the stored configuration
  backup:
    - command: "show version"
      metadata: true
    - command: "show system licenses"
      metadata: true
    - command: "show chassis-inventory"
      metadata: true
    - command: "show configuration | display-set"
      show_command_in_config: true

  ### Post-backup commands (cleanup) (OPTIONAL)
  ## Command outputs aren't saved in stored configuration
  post_backup:
    - command: "exit"
      
### Configuration processing rules
## Processing reduces diff noise and trims non-config boilerplate
processing:
  # strip_patterns:
  #   - '(^((.*)[Ss]ystem [Uu]ptime(.*))$)'
  # config_start: "^config "
  # config_end: "^end$"
  ### Secret masking. When enabled=false, no redaction is applied.
  redaction:
    enabled: false
    patterns:
      - search: 'community (\S+) {'
        replacement: 'community <secret hidden> {'
      - search: ' "\$\d\$\S+; ## SECRET-DATA'
        replacement: ' <secret hidden>;'
