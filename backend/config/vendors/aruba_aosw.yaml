### HPE Aruba Networking Vendor Configuration
## Instructions for backing up HPE Aruba Networking devices

vendor:
  id: "aruba_aosw"
  name: "HPE Aruba Networking"
  description: "AOSW Aruba Wireless, IAP, Instant Controller and Mobility Access Switches"

  # Used in Alcatel OAW-4750 WLAN controller
  # Also Dell controllers

  # HPE Aruba Switches should use a different model as the software is based on the HP Procurve line.

  # Support for IAP & Instant Controller tested with 115, 205, 215 & 325 running 6.4.4.8-4.2.4.5_57965
  # Support for Mobility Access Switches tested with S2500-48P & S2500-24P running 7.4.1.4_54199 and S2500-24P running 7.4.1.7_57823
  # All IAPs connected to a Instant Controller will have the same config output. Only the controller needs to be monitored.

### Session-level behavior
session:
  comment_prefix: "# "
  prompt: '^\(?[\w:.@-]+\)? ?[*^]?(\[[\w\/]+\] ?)?[#>] ?$'

### Commands to execute for backup
## Supported step types in command phases:
## - command: sends command text
## - command + then: sends command text, then sends interactive input
commands:
  ### Pre-backup commands (prepare the session) (OPTIONAL)
  ## Command outputs aren't saved in stored configuration
  pre_backup:
    - command: "enable"
      then: ["{{ enable_password }}"]
    - command: "no paging"
    - command: "encrypt disable"

  ### Main backup command(s)
  ## Commands whose output becomes the stored configuration
  backup:
    - command: "show version"
      metadata: true
    - command: "show inventory"
      metadata: true
    - command: "show slots"
      metadata: true
    - command: "show license"
      metadata: true
    - command: "show license passphrase"
      metadata: true
    - command: "show running-config"
      show_command_in_config: true

  ### Post-backup commands (cleanup) (OPTIONAL)
  ## Command outputs aren't saved in stored configuration
  post_backup:
    - command: "exit" # exit enable
    - command: "exit" # logout

### Configuration processing rules
## Processing reduces diff noise and trims non-config boilerplate
processing:
  ### Lines to strip from captured config (regex patterns)
  # strip_patterns:
  #   - '^version.*$'

  ### Lines that mark config boundaries
  ## If either boundary is missing, keep from/to the file edge.
  # config_start: "^# unifi$"
  # config_end: "^# misc$"

  ### Secret masking. When enabled=false, no redaction is applied.
redaction:
  enabled: false
  patterns:
    - search: '^(secret) \S+\s?$'
      replacement: '\1 <secret removed>'
    - search: '^(enable secret) \S+\s?$'
      replacement: '\1 <secret removed>'
    - search: '^(PRE-SHARE) \S+\s?$'
      replacement: '\1 <secret removed>'
    - search: '^(ipsec) \S+\s?$'
      replacement: '\1 <secret removed>'
    - search: '^(community) \S+\s?$'
      replacement: '\1 <secret removed>'
    - search: '( sha) \S+'
      replacement: '\1 <secret removed>'
    - search: '( des) \S+'
      replacement: '\1 <secret removed>'
    - search: '^(mobility-manager \S+ user \S+) \S+'
      replacement: '\1 <secret removed>'
    - search: '^(mgmt-user \S+ (?:root|guest-provisioning|network-operations|read-only|location-api-mgmt)) \S+\s?$'
      replacement: '\1 <secret removed>'
    - search: '^(mgmt-user \S+) \S+( (?:read-only|guest-mgmt))?\s?$'
      replacement: '\1 <secret removed>\2'
    - search: '^(key) \S+\s?$'
      replacement: '\1 <secret removed>'
    - search: '^(vrrp-passphrase) \S+\s?$'
      replacement: '\1 <secret removed>'
    - search: '^(wpa-passphrase) \S+\s?$'
      replacement: '\1 <secret removed>'
    - search: '^(bkup-passwords) \S+\s?$'
      replacement: '\1 <secret removed>'
    - search: '^(ap-console-password) \S+\s?$'
      replacement: '\1 <secret removed>'
    - search: '^(virtual-controller-key) \S+\s?$'
      replacement: '\1 <secret removed>'
