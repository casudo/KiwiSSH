### Project Downtown - Main Configuration
## This file contains global settings for the application

app:
  debug: true

### Device groups configuration
## TODO: Also allow passwords to be set via environment variables (e.g., DOWNTOWN_GROUP_<GROUP_NAME>_PASSWORD)
## Priority for device configuration (default to more specific): groups: -> nodes:
groups:
  customer-abc-switches:
    username: "admin"
    password: "password"
    ssh_profile: "modern"
    vendor: "cisco_ios"
    timeout: 30

  customer-abc-firewalls:
    username: "admin"
    password: "password"
    ssh_profile: "modern"
    vendor: "fortinet_fortios"
    timeout: 60

### Per-node overrides
## Nodes can override: ssh_profile, vendor, timeout, username, password
## Group CANNOT be overridden - change it in the source instead
## Priority for device configuration (default to more specific): groups: -> nodes:
nodes:
  dc-cluster-active-01:
    timeout: 50 # Timeout override not tested!!
  switch-core-old:
    ssh_profile: "legacy"
    password: "legacy_password"

### Define device sources (e.g., from a file, database, or API)
### For now, we will use a static list defined in the code
### Future implementation may include dynamic loading from external sources
sources:
  file:
    path: /config/sources/devices.csv
#   postgres:
#     host: localhost
#     port: 5432
#     database: downtown
#     user: downtown_user

# Git backup repository settings
git:
  local_path: "./backups"
  auto_commit: true
  commit_message_template: "Backup: {device_name} at {timestamp}"
  # Remote repository configuration (optional)
  # remote:
  #   enabled: false
  #   url: "git@github.com:org/network-backups.git"
  #   branch: "main"
  #   push_after_commit: false

### Backup Job log storage (for tracking backup success/failure status)
## Choose between SQLite (file-based) or PostgreSQL (WIP, untested)
## NOTE: This is NOT the local git backup repository for the groups! 
job_log_storage:
  type: "sqlite"  # Options: sqlite, postgresql
  path: "downtown.sqlite"  # WIll be placed in the same directory as downtown.yaml if relative, or can be absolute path

  ### For PostgreSQL (UNTESTED):
  # type: "postgresql"
  # host: "localhost"
  # port: 5432
  # database: "downtown_backups"
  # user: "downtown"
  # password: "your-password"  # Can also use DOWNTOWN_JOB_LOG_STORAGE_PASSWORD env var

# Backup scheduling (future feature)
