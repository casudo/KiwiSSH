### Ubiquiti UniFi Vendor Configuration
## Instructions for backing up Ubiquiti UniFi devices

vendor:
  id: "ubiquiti_unifi"
  name: "Ubiquiti UniFi"
  description: "Ubiquiti UniFi (Access Points, Switches, ...)"

### Session-level behavior
session:
  comment_prefix: "### "

### Commands to execute for backup
## Supported step types in command phases:
## - command (default): sends command text
## - send_input: sends arbitrary input (defaults to resolved device password when input is omitted)
commands:
  ### Pre-backup commands (prepare the session) (OPTIONAL)
  ## Command outputs aren't saved in stored configuration
  pre_backup: []

  ### Main backup command(s)
  ## Commands whose output becomes the stored configuration
  backup:
    - command: "head -4 /etc/board.info"
      description: "Get board model as metadata"
      metadata: true
    - command: "cat /etc/version"
      description: "Get firmware version as metadata"
      metadata: true
    - command: "ifconfig"
      description: "Get network interface configuration for all interfaces"
    - command: "cat /tmp/system.cfg"
      description: "Get system configuration"

  ### Post-backup commands (cleanup) (OPTIONAL)
  ## Command outputs aren't saved in stored configuration
  post_backup: []

### Configuration processing rules
## Processing reduces diff noise and trims non-config boilerplate
processing:
  ### Lines to strip from captured config (regex patterns)
  strip_patterns:
    - "^\\s*RX packets:.*$"
    - "^\\s*TX packets:.*$"
    - "^\\s*RX bytes:.*$"

  ### Lines that mark config boundaries
  ## If either boundary is missing, keep from/to the file edge.
  # config_start: "^# unifi$"
  # config_end: "^# misc$"

  ### Secret masking. When enabled=false, no redaction is applied.
  redaction:
    enabled: false
    patterns:
      - search: "^(unifi\\.anonymous_(controller|site)_id=).*$"
        replacement: "\\1<ID redacted>"
      - search: "^(unifi\\.reporterid=).*$"
        replacement: "\\1<ID redacted>"
      - search: "^(unifi\\.siteid=).*$"
        replacement: "\\1<ID redacted>"
      - search: "^(unifi\\.key=).*$"
        replacement: "\\1<ID redacted>"
      - search: "^(users\\..+\\.password=).*$"
        replacement: "\\1<password redacted>"
      - search: "^(aaa\\..+\\.wpa\\.psk=).*$"
        replacement: "\\1<password redacted>"
      - search: "^(mesh\\.psk=).*$"
        replacement: "\\1<password redacted>"
      - search: "^(syslog\\.remote\\.key=).*$"
        replacement: "\\1<password redacted>"
      - search: "^(.+\\.psk\\_file\\..+\\.psk=).*$"
        replacement: "\\1<password redacted>"
