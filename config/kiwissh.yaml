### KiwiSSH - Main Configuration

## Application settings
app:
  debug: true
  threads: 20 # Max concurrent SSH fetch sessions across scheduled/API-triggered backups
  timeout: 30 # Global SSH timeout in seconds (can be overridden in groups/nodes)
  retry: 3 # Global SSH retry count (additional attempts after the first)
  api:
    host: "127.0.0.1"
    port: 8000
    cors_origins:
      - "http://localhost:5173"
      - "http://127.0.0.1:5173"
  schedule: # Global backup schedule
    cron: "0 2 * * *"

### Device groups configuration
## TODO: Also allow passwords to be set via environment variables (e.g., KIWISSH_GROUP_<GROUP_NAME>_PASSWORD)
## Priority for device configuration (default to most specific): app: -> groups: -> nodes:
groups:
  customer-abc-switches:
    username: "admin"
    password: "password"
    ssh_profile: "modern"
    vendor: "cisco_ios"
    timeout: 40
    retry: 2
    schedule:
      cron: "0 7 * * *" # Daily at 7 AM
    ### Optional per-group remote override for multi-org setups:
    # git:
    #   remote:
    #     url: "ssh://git@172.16.50.50:222/customer-abc/leaf-switches.git"
    #     branch: "main"

  customer-abc-firewalls:
    username: "admin"
    password: "password"
    ssh_profile: "modern"
    vendor: "fortinet_fortios"
    timeout: 60
    retry: 1

### Per-node overrides
## Nodes can override: ssh_profile, vendor, timeout, retry, username, password, schedule
## Group CANNOT be overridden - change it in the source instead
## Priority for device configuration (default to most specific): app: -> groups: -> nodes:
nodes:
  dc-cluster-active-01:
    timeout: 50 # Timeout override not tested!!
    retry: 5
  switch-core-old:
    ssh_profile: "legacy"
    password: "legacy_password"
    schedule:
      cron: "0 */6 * * *"

### Device sources
## Load from file or PostgreSQL. At least one source is required.
## Required columns: group, device_name, ip_address, enabled
sources:
  file: "/config/sources/devices.csv"
# postgres:
#     host: "localhost"
#     port: 5432
#     database: "existing_inventory_db"
#     table: "devices"
#     username: "inventory_reader"
#     password: "inventory-reader-password"

### Git backup repository settings
### Local git storage is always active and stores one repository per group under local_path.
git:
  local_path: "/config/backups"
  commit_message_template: "Backup: {group}/{device_name} at {timestamp}"
  ### Default remote template used by groups without overrides. (optional)
  ### URL can be optional if group-level overrides are used, but if remote.enabled is true, at least one URL must be provided either globally or at the group level.
  # remote:
  #   enabled: true
  #   url: "git@github.com:<YOUR_ORGANIZATION_HERE>/{group}.git" # Keep {group} placeholder for dynamic repo names based on group
  #   branch: "main" # Optional, defaults to main

### KiwiSSH application database (PostgreSQL only)
## This database stores KiwiSSH-owned data (backup job logs, favorites, etc.)
## The database itself and the user must already exist.
## The app will create the required tables automatically.
application_database:
  host: "localhost"
  port: 5432
  database: "kiwissh"
  user: "kiwissh_user"
  password: "kiwissh-user-password"
