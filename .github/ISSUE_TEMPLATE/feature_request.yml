name: Feature request
description: Suggest an improvement or new feature for KiwiSSH
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the feature you would like to see in KiwiSSH.

  - type: textarea
    id: feature
    attributes:
      label: Feature description
      description: What new feature would you like to see?
      placeholder: It would be great if ...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, or related issues.
