### Cisco IOS Vendor Configuration
## Instructions for backing up Cisco IOS and IOS-XE devices

vendor:
  id: "cisco_ios"
  name: "Cisco IOS"
  description: "Cisco IOS and IOS-XE devices (routers, switches)"

### Connection settings
connection:
  default_port: 22
  enable_mode: true  # Device requires enable mode for full config access

### Prompt patterns for detecting command completion
prompts:
  ## Normal user mode: hostname>
  user: "^[\\w\\-\\.]+>\\s*$"
  ## Privileged mode: hostname#
  privileged: "^[\\w\\-\\.]+#\\s*$"
  ## Config mode: hostname(config)#
  config: "^[\\w\\-\\.]+\\(config[\\w\\-]*\\)#\\s*$"

### Commands to execute for backup
commands:
  ## Pre-backup commands (prepare the session)
  pre_backup:
    - command: "terminal length 0"
      description: "Disable paging"
      expect_prompt: true
      required: true
    - command: "terminal width 512"
      description: "Set terminal width"
      expect_prompt: true
      required: false

  ## Main backup command(s)
  backup:
    - command: "show running-config"
      description: "Get running configuration"
      timeout: 120
      capture: true

  ## Post-backup commands (cleanup)
  post_backup:
    - command: "terminal length 24"
      description: "Restore paging"
      expect_prompt: true
      required: false

### Configuration processing rules
processing:
  ## Lines to strip from captured config (regex patterns)
  strip_patterns:
    - "^Building configuration\\.\\.\\."
    - "^Current configuration\\s*:\\s*\\d+\\s*bytes"
    - "^!\\s*Last configuration change"
    - "^!\\s*NVRAM config last updated"
    - "^ntp clock-period \\d+"  # Changes frequently, not meaningful

  ## Lines that mark config boundaries
  config_start: "^version \\d+\\.\\d+"
  config_end: "^end$"

  ## Normalize certain patterns to reduce diff noise
  normalize:
    - pattern: "^!Time:.*"
      replacement: ""
